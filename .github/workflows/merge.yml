name: Merge JSON Files

on:
  push:
    paths:
      - 'man/prayers.json'
      - 'uz/**/*.json'

jobs:
  merge-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Merge JSON Files
        run: |
          prayers_file="man/prayers.json"
          output_dir="."

          prayers=$(jq -r '.[]' "$prayers_file")

          for prayer in $prayers; do
            merge_list=$(jq -r '.[]' "man/$prayer")
            merged_array="[]"

            for file in $merge_list; do
              file_path="uz/$file"
              alt_path="uz/${file##*/}"

              if [ -f "$file_path" ]; then
                content=$(cat "$file_path")
              elif [ -f "$alt_path" ]; then
                content=$(cat "$alt_path")
              else
                echo "File $file not found, skipping."
                continue
              fi

              merged_array=$(jq -s 'add' <(echo "$merged_array") <(echo "$content"))
            done

            echo "$merged_array" > "$output_dir/$prayer"
            echo "Merged $prayer successfully."
          done
